<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alleon Capital — Interactive Investment Platform</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg: #0a0e14;
            --surface: #131820;
            --surface2: #1a1f2b;
            --surface3: #1f2533;
            --gold: #d4a843;
            --gold-light: #e8c468;
            --green: #2ecc71;
            --red: #e74c3c;
            --yellow: #f0c040;
            --text: #e1e4eb;
            --text2: #a8b2c1;
            --text3: #6b7385;
            --border: #252b38;
            --accent: #3b82f6;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            display: flex;
            min-height: 100vh;
        }
        .sidebar {
            width: 260px;
            background: var(--surface);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            position: fixed;
            top: 0;
            left: 0;
            bottom: 0;
            z-index: 100;
            overflow-y: auto;
        }
        .sidebar-logo {
            padding: 20px;
            border-bottom: 1px solid var(--border);
            font-weight: 700;
            font-size: 1.2rem;
            color: #fff;
        }
        .sidebar-logo .icon {
            display: inline-block;
            width: 30px;
            height: 30px;
            border-radius: 8px;
            background: linear-gradient(135deg, var(--gold), #b8861f);
            text-align: center;
            line-height: 30px;
            color: #0a0e14;
            margin-right: 8px;
        }
        .sidebar-nav {
            flex: 1;
            padding: 10px;
        }
        .sidebar-nav a {
            display: block;
            padding: 12px;
            margin-bottom: 4px;
            border-radius: 8px;
            color: var(--text2);
            text-decoration: none;
            cursor: pointer;
            transition: all 0.2s;
        }
        .sidebar-nav a:hover, .sidebar-nav a.active {
            background: var(--surface3);
            color: var(--gold-light);
        }
        .main {
            margin-left: 260px;
            flex: 1;
            display: flex;
            flex-direction: column;
        }
        .topbar {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 16px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .topbar h1 { font-size: 1.4rem; margin: 0; }
        .topbar .user {
            display: flex;
            align-items: center;
            gap: 10px;
            background: var(--surface2);
            padding: 8px 14px;
            border-radius: 25px;
        }
        .content {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
        }
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 16px;
        }
        .card h2 {
            font-size: 1.1rem;
            margin-bottom: 16px;
            color: #fff;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 14px;
            margin-bottom: 20px;
        }
        .stat {
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 16px;
            text-align: center;
        }
        .stat-value {
            font-size: 1.6rem;
            font-weight: 700;
            color: var(--gold-light);
            margin: 8px 0;
        }
        .stat-label {
            font-size: 0.8rem;
            color: var(--text2);
        }
        .btn {
            display: inline-block;
            padding: 10px 16px;
            border-radius: 20px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.9rem;
            transition: all 0.2s;
            margin-right: 8px;
            margin-bottom: 8px;
        }
        .btn-primary {
            background: var(--gold);
            color: #0a0e14;
        }
        .btn-primary:hover {
            background: var(--gold-light);
            transform: translateY(-2px);
        }
        .btn-outline {
            background: transparent;
            border: 2px solid var(--border);
            color: var(--text);
        }
        .btn-outline:hover {
            border-color: var(--gold);
        }
        .btn-sm {
            padding: 6px 12px;
            font-size: 0.8rem;
        }
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 200;
        }
        .modal.show { display: flex; }
        .modal-content {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 24px;
            max-width: 500px;
            width: 90%;
        }
        .modal-content h3 {
            margin-bottom: 16px;
            font-size: 1.2rem;
        }
        .form-group {
            margin-bottom: 12px;
        }
        .form-group label {
            display: block;
            margin-bottom: 4px;
            font-weight: 600;
            font-size: 0.9rem;
        }
        .form-group input, .form-group select {
            width: 100%;
            padding: 10px;
            border: 1px solid var(--border);
            background: var(--surface2);
            color: #fff;
            border-radius: 6px;
            font-family: inherit;
        }
        .alert {
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 12px;
        }
        .alert-success {
            background: rgba(46, 204, 113, 0.2);
            color: var(--green);
            border: 1px solid var(--green);
        }
        .alert-error {
            background: rgba(231, 76, 60, 0.2);
            color: var(--red);
            border: 1px solid var(--red);
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 12px;
        }
        table th {
            text-align: left;
            padding: 12px;
            background: var(--surface2);
            font-weight: 600;
            font-size: 0.85rem;
            border-bottom: 1px solid var(--border);
        }
        table td {
            padding: 12px;
            border-bottom: 1px solid var(--border);
        }
        .input-group {
            display: flex;
            gap: 8px;
            margin-bottom: 12px;
        }
        .input-group input {
            flex: 1;
        }
        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            background: var(--green);
            color: #0a0e14;
            padding: 14px 20px;
            border-radius: 8px;
            font-weight: 600;
            z-index: 300;
            animation: slideIn 0.3s ease;
        }
        @keyframes slideIn {
            from { transform: translateX(400px); }
            to { transform: translateX(0); }
        }
        @media (max-width: 768px) {
            .sidebar { display: none; }
            .main { margin-left: 0; }
        }
    </style>
</head>
<body>
    <aside class="sidebar">
        <div class="sidebar-logo"><span class="icon">▲</span>Alleon Capital</div>
        <nav class="sidebar-nav">
            <a class="nav-link active" data-page="dashboard">📊 Dashboard</a>
            <a class="nav-link" data-page="wallet">💳 Wallet</a>
            <a class="nav-link" data-page="invest">🏪 Invest</a>
            <a class="nav-link" data-page="portfolio">📈 Portfolio</a>
            <a class="nav-link" data-page="transactions">📋 Transactions</a>
        </nav>
    </aside>

    <div class="main">
        <div class="topbar">
            <h1 id="pageTitle">Dashboard</h1>
            <div class="user">
                <span id="userName">Jane Kamau</span>
                <span style="font-size:0.8rem;color:var(--text2);">👤</span>
            </div>
        </div>
        <div class="content" id="content"></div>
    </div>

    <div class="modal" id="modal">
        <div class="modal-content">
            <h3 id="modalTitle"></h3>
            <div id="modalBody"></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script>
        // ==================== PERSISTENT DATA ENGINE ====================
        class DataStore {
            constructor() {
                const defaults = {
                    investor: {
                        name: 'Jane Kamau',
                        id: 'INV-0042',
                        balance: 125000,
                        totalInvested: 0,
                        totalEarnings: 0,
                        portfolio: {}
                    },
                    transactions: [],
                    businesses: [
                        { id: 'B001', name: 'Mali Fresh Farms', goal: 500000, raised: 320000, rate: 18, duration: 12 },
                        { id: 'B002', name: 'TechSavvy Solutions', goal: 800000, raised: 600000, rate: 22, duration: 8 },
                        { id: 'B003', name: 'Zawadi Textiles', goal: 350000, raised: 180000, rate: 14, duration: 18 },
                        { id: 'B004', name: 'Sunrise Solar', goal: 1200000, raised: 900000, rate: 25, duration: 6 },
                    ]
                };

                const stored = localStorage.getItem('alleonData');
                this.data = stored ? JSON.parse(stored) : defaults;
            }

            save() {
                localStorage.setItem('alleonData', JSON.stringify(this.data));
            }

            get investor() { return this.data.investor; }
            get transactions() { return this.data.transactions; }
            get businesses() { return this.data.businesses; }

            addTransaction(type, amount, description) {
                this.data.transactions.unshift({
                    id: Date.now(),
                    date: new Date().toLocaleDateString(),
                    type,
                    amount,
                    description,
                    balance: this.data.investor.balance
                });
                this.save();
            }

            deposit(amount) {
                this.data.investor.balance += amount;
                this.addTransaction('Deposit', amount, 'Funds deposited');
                this.save();
                return true;
            }

            withdraw(amount) {
                if (amount > this.data.investor.balance) return false;
                this.data.investor.balance -= amount;
                this.addTransaction('Withdrawal', amount, 'Funds withdrawn');
                this.save();
                return true;
            }

            invest(businessId, amount) {
                if (amount > this.data.investor.balance) return false;
                
                this.data.investor.balance -= amount;
                this.data.investor.totalInvested += amount;
                
                if (!this.data.investor.portfolio[businessId]) {
                    this.data.investor.portfolio[businessId] = 0;
                }
                this.data.investor.portfolio[businessId] += amount;
                
                const biz = this.data.businesses.find(b => b.id === businessId);
                this.addTransaction('Investment', amount, `Invested in ${biz.name}`);
                this.save();
                return true;
            }

            calculateReturns() {
                let totalReturns = 0;
                for (const [bizId, invested] of Object.entries(this.data.investor.portfolio)) {
                    const biz = this.data.businesses.find(b => b.id === bizId);
                    if (biz) {
                        const returns = (invested * biz.rate) / 100;
                        totalReturns += returns;
                    }
                }
                return totalReturns;
            }
        }

        const store = new DataStore();
        let currentPage = 'dashboard';

        // ==================== NAVIGATION ====================
        document.querySelectorAll('.nav-link').forEach(link => {
            link.addEventListener('click', (e) => {
                document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
                e.target.classList.add('active');
                currentPage = e.target.dataset.page;
                renderPage();
            });
        });

        // ==================== RENDER FUNCTIONS ====================
        function renderPage() {
            const titles = {
                dashboard: 'Dashboard',
                wallet: 'Digital Wallet',
                invest: 'Investment Marketplace',
                portfolio: 'My Portfolio',
                transactions: 'Transaction History'
            };
            document.getElementById('pageTitle').textContent = titles[currentPage];

            switch(currentPage) {
                case 'dashboard': renderDashboard(); break;
                case 'wallet': renderWallet(); break;
                case 'invest': renderInvest(); break;
                case 'portfolio': renderPortfolio(); break;
                case 'transactions': renderTransactions(); break;
            }
        }

        function renderDashboard() {
            const inv = store.investor;
            const returns = store.calculateReturns();
            const portfolioValue = inv.totalInvested + returns;

            document.getElementById('content').innerHTML = `
                <div class="stats-grid">
                    <div class="stat">
                        <div class="stat-label">Balance</div>
                        <div class="stat-value">KSH ${inv.balance.toLocaleString()}</div>
                    </div>
                    <div class="stat">
                        <div class="stat-label">Invested</div>
                        <div class="stat-value">KSH ${inv.totalInvested.toLocaleString()}</div>
                    </div>
                    <div class="stat">
                        <div class="stat-label">Portfolio Value</div>
                        <div class="stat-value">KSH ${portfolioValue.toLocaleString()}</div>
                    </div>
                    <div class="stat">
                        <div class="stat-label">Estimated Returns</div>
                        <div class="stat-value" style="color:var(--green);">KSH ${Math.round(returns).toLocaleString()}</div>
                    </div>
                </div>

                <div class="card">
                    <h2>Quick Actions</h2>
                    <button class="btn btn-primary" onclick="openDepositModal()">+ Deposit Funds</button>
                    <button class="btn btn-outline" onclick="openWithdrawModal()">- Withdraw</button>
                    <button class="btn btn-outline" onclick="navigateTo('invest')">🏪 Invest Now</button>
                </div>

                <div class="card">
                    <h2>Recent Activity</h2>
                    <table>
                        <thead>
                            <tr><th>Date</th><th>Type</th><th>Amount</th><th>Balance</th></tr>
                        </thead>
                        <tbody>
                            ${store.transactions.slice(0, 5).map(t => `
                                <tr>
                                    <td>${t.date}</td>
                                    <td>${t.type}</td>
                                    <td style="color:${t.type === 'Deposit' || t.type === 'Investment' ? 'var(--green)' : 'var(--red)'}">
                                        ${t.type === 'Deposit' || t.type === 'Investment' ? '+' : '-'} KSH ${t.amount.toLocaleString()}
                                    </td>
                                    <td>KSH ${t.balance.toLocaleString()}</td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                </div>
            `;
        }

        function renderWallet() {
            const inv = store.investor;
            document.getElementById('content').innerHTML = `
                <div class="stats-grid">
                    <div class="stat">
                        <div class="stat-label">Available Balance</div>
                        <div class="stat-value">KSH ${inv.balance.toLocaleString()}</div>
                    </div>
                </div>

                <div class="card">
                    <h2>Wallet Actions</h2>
                    <button class="btn btn-primary" onclick="openDepositModal()">+ Deposit</button>
                    <button class="btn btn-outline" onclick="openWithdrawModal()">- Withdraw</button>
                </div>

                <div class="card">
                    <h2>All Transactions</h2>
                    <table>
                        <thead>
                            <tr><th>Date</th><th>Type</th><th>Amount</th><th>Description</th><th>Balance</th></tr>
                        </thead>
                        <tbody>
                            ${store.transactions.map(t => `
                                <tr>
                                    <td>${t.date}</td>
                                    <td>${t.type}</td>
                                    <td>${t.amount.toLocaleString()}</td>
                                    <td>${t.description}</td>
                                    <td>KSH ${t.balance.toLocaleString()}</td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                </div>
            `;
        }

        function renderInvest() {
            const inv = store.investor;
            document.getElementById('content').innerHTML = `
                <div class="card">
                    <h2>Available Investment Opportunities</h2>
                    ${store.businesses.map(b => {
                        const remaining = b.goal - b.raised;
                        const percent = Math.round((b.raised / b.goal) * 100);
                        return `
                            <div style="background:var(--surface2);padding:16px;border-radius:8px;margin-bottom:12px;border:1px solid var(--border);">
                                <div style="display:flex;justify-content:space-between;margin-bottom:8px;">
                                    <strong style="font-size:1rem;">${b.name}</strong>
                                    <span style="color:var(--gold);">${b.rate}% Return</span>
                                </div>
                                <p style="font-size:0.85rem;color:var(--text2);margin-bottom:8px;">Goal: KSH ${b.goal.toLocaleString()} | Raised: KSH ${b.raised.toLocaleString()} | Remaining: KSH ${remaining.toLocaleString()}</p>
                                <div style="background:var(--surface3);height:8px;border-radius:4px;margin-bottom:8px;overflow:hidden;">
                                    <div style="background:var(--gold);height:100%;width:${percent}%;"></div>
                                </div>
                                <div style="display:flex;justify-content:space-between;align-items:center;">
                                    <span style="font-size:0.8rem;color:var(--text3);">${percent}% Funded</span>
                                    <button class="btn btn-primary btn-sm" onclick="openInvestModal('${b.id}', '${b.name}')">Invest</button>
                                </div>
                            </div>
                        `;
                    }).join('')}
                </div>
            `;
        }

        function renderPortfolio() {
            const inv = store.investor;
            const portfolio = inv.portfolio;
            const holdings = Object.entries(portfolio).map(([bizId, amount]) => {
                const biz = store.businesses.find(b => b.id === bizId);
                const returns = (amount * biz.rate) / 100;
                return { biz, amount, returns };
            });

            if (holdings.length === 0) {
                document.getElementById('content').innerHTML = `
                    <div class="card">
                        <h2>My Portfolio</h2>
                        <p style="color:var(--text2);">You haven't invested yet. <a href="#" onclick="navigateTo('invest');return false;" style="color:var(--gold);">Start investing now →</a></p>
                    </div>
                `;
                return;
            }

            let totalInvested = 0, totalReturns = 0;
            holdings.forEach(h => {
                totalInvested += h.amount;
                totalReturns += h.returns;
            });

            document.getElementById('content').innerHTML = `
                <div class="stats-grid">
                    <div class="stat">
                        <div class="stat-label">Total Invested</div>
                        <div class="stat-value">KSH ${totalInvested.toLocaleString()}</div>
                    </div>
                    <div class="stat">
                        <div class="stat-label">Estimated Returns</div>
                        <div class="stat-value" style="color:var(--green);">KSH ${Math.round(totalReturns).toLocaleString()}</div>
                    </div>
                    <div class="stat">
                        <div class="stat-label">Portfolio Value</div>
                        <div class="stat-value">KSH ${(totalInvested + totalReturns).toLocaleString()}</div>
                    </div>
                </div>

                <div class="card">
                    <h2>Holdings</h2>
                    <table>
                        <thead>
                            <tr><th>Business</th><th>Invested</th><th>Est. Returns (18 mo)</th><th>Total Value</th></tr>
                        </thead>
                        <tbody>
                            ${holdings.map(h => `
                                <tr>
                                    <td>${h.biz.name}</td>
                                    <td>KSH ${h.amount.toLocaleString()}</td>
                                    <td style="color:var(--green);">KSH ${Math.round(h.returns).toLocaleString()}</td>
                                    <td>KSH ${(h.amount + h.returns).toLocaleString()}</td>
                                </tr>
                            `).join('')}
                            <tr style="font-weight:700;background:var(--surface2);">
                                <td>Total</td>
                                <td>KSH ${totalInvested.toLocaleString()}</td>
                                <td style="color:var(--green);">KSH ${Math.round(totalReturns).toLocaleString()}</td>
                                <td>KSH ${(totalInvested + totalReturns).toLocaleString()}</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            `;
        }

        function renderTransactions() {
            document.getElementById('content').innerHTML = `
                <div class="card">
                    <h2>Transaction History</h2>
                    <table>
                        <thead>
                            <tr><th>Date</th><th>Type</th><th>Amount</th><th>Description</th><th>Balance</th></tr>
                        </thead>
                        <tbody>
                            ${store.transactions.length === 0 ? '<tr><td colspan="5" style="text-align:center;color:var(--text2);">No transactions yet</td></tr>' : store.transactions.map(t => `
                                <tr>
                                    <td>${t.date}</td>
                                    <td>${t.type}</td>
                                    <td style="color:${t.type === 'Deposit' ? 'var(--green)' : 'var(--red)'};">${t.type === 'Deposit' ? '+' : '-'} KSH ${t.amount.toLocaleString()}</td>
                                    <td>${t.description}</td>
                                    <td>KSH ${t.balance.toLocaleString()}</td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                </div>
            `;
        }

        // ==================== MODALS ====================
        function openDepositModal() {
            document.getElementById('modalTitle').textContent = 'Deposit Funds';
            document.getElementById('modalBody').innerHTML = `
                <div class="form-group">
                    <label>Amount (KSH)</label>
                    <input type="number" id="depositAmount" placeholder="Enter amount" min="100">
                </div>
                <div class="form-group">
                    <label>Payment Method</label>
                    <select>
                        <option>M-Pesa</option>
                        <option>Bank Transfer</option>
                        <option>Card</option>
                    </select>
                </div>
                <button class="btn btn-primary" onclick="processDeposit()">Deposit</button>
                <button class="btn btn-outline" onclick="closeModal()">Cancel</button>
            `;
            document.getElementById('modal').classList.add('show');
        }

        function openWithdrawModal() {
            const maxWithdraw = store.investor.balance;
            document.getElementById('modalTitle').textContent = 'Withdraw Funds';
            document.getElementById('modalBody').innerHTML = `
                <div class="form-group">
                    <label>Amount (KSH) - Max: KSH ${maxWithdraw.toLocaleString()}</label>
                    <input type="number" id="withdrawAmount" placeholder="Enter amount" max="${maxWithdraw}" min="100">
                </div>
                <button class="btn btn-primary" onclick="processWithdraw()">Withdraw</button>
                <button class="btn btn-outline" onclick="closeModal()">Cancel</button>
            `;
            document.getElementById('modal').classList.add('show');
        }

        function openInvestModal(bizId, bizName) {
            const remaining = store.businesses.find(b => b.id === bizId).goal - store.businesses.find(b => b.id === bizId).raised;
            document.getElementById('modalTitle').textContent = `Invest in ${bizName}`;
            document.getElementById('modalBody').innerHTML = `
                <div class="form-group">
                    <label>Investment Amount (KSH)</label>
                    <input type="number" id="investAmount" placeholder="Enter amount" max="${store.investor.balance}" min="1000">
                </div>
                <p style="font-size:0.85rem;color:var(--text2);margin-bottom:12px;">Available balance: KSH ${store.investor.balance.toLocaleString()}</p>
                <button class="btn btn-primary" onclick="processInvestment('${bizId}', '${bizName}')">Invest</button>
                <button class="btn btn-outline" onclick="closeModal()">Cancel</button>
            `;
            document.getElementById('modal').classList.add('show');
        }

        function processDeposit() {
            const amount = parseInt(document.getElementById('depositAmount').value);
            if (amount < 100 || !amount) {
                alert('Minimum deposit is KSH 100');
                return;
            }
            store.deposit(amount);
            closeModal();
            showNotification(`✅ Deposited KSH ${amount.toLocaleString()}`);
            renderPage();
        }

        function processWithdraw() {
            const amount = parseInt(document.getElementById('withdrawAmount').value);
            if (!store.withdraw(amount)) {
                alert('Insufficient balance');
                return;
            }
            closeModal();
            showNotification(`✅ Withdrew KSH ${amount.toLocaleString()}`);
            renderPage();
        }

        function processInvestment(bizId, bizName) {
            const amount = parseInt(document.getElementById('investAmount').value);
            if (!store.invest(bizId, amount)) {
                alert('Insufficient balance');
                return;
            }
            closeModal();
            showNotification(`✅ Invested KSH ${amount.toLocaleString()} in ${bizName}`);
            renderPage();
        }

        function closeModal() {
            document.getElementById('modal').classList.remove('show');
        }

        function showNotification(msg) {
            const notif = document.createElement('div');
            notif.className = 'notification';
            notif.textContent = msg;
            document.body.appendChild(notif);
            setTimeout(() => notif.remove(), 3000);
        }

        function navigateTo(page) {
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
            document.querySelector(`[data-page="${page}"]`).classList.add('active');
            currentPage = page;
            renderPage();
        }

        // Initialize
        renderPage();
    </script>
</body>
</html>
